services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: komunikator
      POSTGRES_PASSWORD: komunikator
      POSTGRES_DB: komunikator_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U komunikator"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://komunikator:komunikator@db:5432/komunikator_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
